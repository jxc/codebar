name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: xcodebuild -project CodeBar.xcodeproj -scheme CodeBar -configuration Debug build

      - name: Test
        run: xcodebuild -project CodeBar.xcodeproj -scheme CodeBar -configuration Debug test
